import requests
from bs4 import BeautifulSoup
import json
import os
import hashlib
from datetime import datetime
from linebot import LineBotApi
from linebot.models import TextSendMessage

# ===== LINE設定 =====
LINE_CHANNEL_ACCESS_TOKEN = os.environ.get('LINE_CHANNEL_ACCESS_TOKEN')
LINE_USER_ID = os.environ.get('LINE_USER_ID')
line_bot_api = LineBotApi(LINE_CHANNEL_ACCESS_TOKEN)

# ===== 監視対象 =====
SITES = [
    "https://www.jtta.or.jp/",
    "https://tabletennisworld.com/",
]

# ===== キーワード =====
KEYWORDS = ["大会", "要項", "申込", "案内"]

# ===== state管理 =====
def load_state():
    if os.path.exists('state.json'):
        with open('state.json', 'r') as f:
            return json.load(f)
    return {}

def save_state(state):
    with open('state.json', 'w') as f:
        json.dump(state, f, indent=2)

# ===== HTML取得 =====
def fetch(url):
    try:
        res = requests.get(url, timeout=10)
        res.raise_for_status()
        res.encoding = res.apparent_encoding
        return res.text
    except Exception as e:
        print(f"取得エラー: {url} {e}")
        return None

# ===== 本文抽出（ここが重要）=====
def extract_main_text(html):
    soup = BeautifulSoup(html, "html.parser")

    # 不要部分を削除
    for tag in soup(["script", "style", "header", "footer", "nav"]):
        tag.decompose()

    text = soup.get_text()
    return text.strip()

# ===== キーワード検出 =====
def find_keywords(text):
    return [k for k in KEYWORDS if k in text]

# ===== LINE通知 =====
def notify(message):
    try:
        line_bot_api.push_message(
            LINE_USER_ID,
            TextSendMessage(text=message)
        )
        print("LINE送信:", message)
    except Exception as e:
        print("LINEエラー:", e)

# ===== メイン処理 =====
def main():
    state = load_state()

    for url in SITES:
        print("チェック:", url)

        html = fetch(url)
        if not html:
            continue

        main_text = extract_main_text(html)
        current_hash = hashlib.md5(main_text.encode()).hexdigest()
        keywords = find_keywords(main_text)

        if url not in state:
            state[url] = {"hash": None}

        # 変更検出
        if state[url]["hash"] != current_hash:
            message = f"🔔 {url} が更新されました！\n"

            if keywords:
                message += f"キーワード: {', '.join(keywords)}\n"

            message += f"更新時刻: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}"

            notify(message)

            state[url]["hash"] = current_hash

    save_state(state)
    print("完了")

# ===== 実行 =====
if __name__ == "__main__":
    main()
    
